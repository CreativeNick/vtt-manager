name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-partykit:
    name: PartyKit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy realtime server
        run: npx partykit deploy
        env:
          PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN }}
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}

  deploy-pages:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    needs: deploy-partykit
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          # Same host as PartyKit, without https:// — e.g. campaign-manager.yourname.partykit.dev
          VITE_PARTYKIT_HOST: ${{ vars.VITE_PARTYKIT_HOST }}

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=campaign-manager
